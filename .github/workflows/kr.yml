name: KR Stock Scanner KST

on:
  schedule:
    - cron: '0 11 * * *' # 韩国时间 20:00
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas openpyxl requests lxml googletrans==4.0.0-rc1

      - name: Prepare Directories
        run: |
          mkdir -p output
          mkdir -p ticker_storage
          mkdir -p cache_kr

      - name: Run KR Scanner
        run: python ko_scanner.py --use-data-cache

      - name: Send KR Excel To Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notif.py kr

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kr-stock-report
          path: output/*
